# CloudNativePG operator — reconciles Cluster CRs into PostgreSQL StatefulSets.
# Chart ref: https://github.com/cloudnative-pg/charts/blob/main/charts/cloudnative-pg/values.yaml
crds:
  create: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

monitoring:
  podMonitorEnabled: false
