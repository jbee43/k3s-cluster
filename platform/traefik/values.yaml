# Traefik — ingress controller (TLS terminator) behind MetalLB.
# Chart ref: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
deployment:
  replicas: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

service:
  type: LoadBalancer

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    redirectTo:
      port: websecure
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    tls:
      enabled: true
  metrics:
    port: 9100
    expose:
      default: false

metrics:
  prometheus:
    entryPoint: metrics

logs:
  general:
    level: INFO
  access:
    enabled: true
