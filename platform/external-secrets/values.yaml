# External Secrets Operator — syncs secrets from external providers into k8s Secrets.
# Chart ref: https://github.com/external-secrets/external-secrets/blob/main/deploy/charts/external-secrets/values.yaml
replicaCount: 2

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

webhook:
  replicaCount: 2
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

certController:
  replicaCount: 2
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

crds:
  createClusterExternalSecret: true
  createClusterSecretStore: true
  createPushSecret: true
