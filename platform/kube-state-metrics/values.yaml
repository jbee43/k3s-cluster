# kube-state-metrics — Kubernetes object metrics exporter for Prometheus.
# Chart ref: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-state-metrics/values.yaml
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

networkPolicy:
  enabled: true

metricLabelsAllowlist:
  - pods=[app.kubernetes.io/name,app.kubernetes.io/instance]
  - deployments=[app.kubernetes.io/name,app.kubernetes.io/instance]

prometheus:
  monitor:
    enabled: false
