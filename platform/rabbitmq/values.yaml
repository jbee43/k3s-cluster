# RabbitMQ — message broker via the official Cluster Operator (vendored at templates/operator.yaml).
# Operator: https://github.com/rabbitmq/cluster-operator
# CR ref:   https://www.rabbitmq.com/kubernetes/operator/using-operator
#
# Credentials are generated by the operator and exposed in:
#   Secret/<cluster.name>-default-user  (keys: username, password)
#   Secret/<cluster.name>-erlang-cookie (key:  .erlang.cookie)
# Retrieve with:
#   kubectl get secret rabbitmq-default-user -n rabbitmq -o jsonpath='{.data.password}' | base64 -d
cluster:
  name: rabbitmq
  replicas: 3
  # image left unset — the operator pins a tested RabbitMQ image per release
  storageClass: longhorn  # block storage; NFS is unsafe for Mnesia/Khepri
  storageSize: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  additionalPlugins:
    - rabbitmq_management
    - rabbitmq_prometheus

ingress:
  enabled: true
  host: rabbitmq.k3s.local
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    secretName: rabbitmq-tls

networkPolicy:
  enabled: true
